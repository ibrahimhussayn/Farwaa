<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey Farwaa ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
}

.container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn 1.5s ease;
max-width:400px;
}

h1{
color:#ff4d6d;
}

.pickup{
margin:10px 0;
font-size:17px;
opacity:0;
animation:fadeUp 1s forwards;
}

.pickup:nth-child(2){animation-delay:1s;}
.pickup:nth-child(3){animation-delay:2s;}
.pickup:nth-child(4){animation-delay:3s;}
.pickup:nth-child(5){animation-delay:4s;}

.buttons{
margin-top:30px;
position:relative;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

#yes{
background:#ff4d6d;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#555;
color:white;
position:absolute;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* floating hearts */

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-10vh) scale(1.5);}
}

</style>
</head>

<body>

<div class="container">

<h1>Hey Farwaa ❤️</h1>

<p class="pickup">1. I know we just met… but somehow you already made my day brighter.</p>
<p class="pickup">2. I didn't expect today to be special… but then I met you.</p>
<p class="pickup">3. I may not know you well yet, but I'd really like to change that.</p>
<p class="pickup">4. So I wanted to ask something simple…</p>

<h2>Would you go on a date with me? 😊</h2>

<div class="buttons">
<button id="yes" onclick="yesClicked()">Yes ❤️</button>
<button id="no" onmouseover="moveButton()">No</button>
</div>

</div>

<script>

function yesClicked(){

document.body.innerHTML = `
<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;color:white;font-family:Arial;text-align:center;background:linear-gradient(135deg,#ff758c,#ff7eb3);">

<h1 style="font-size:40px;">You made my day, sweetheart ❤️</h1>
<p style="font-size:22px;">Now I'm really looking forward to our date 😊</p>

</div>
`;

}

function moveButton(){

const btn=document.getElementById("no");

const x=Math.random()*(window.innerWidth-100);
const y=Math.random()*(window.innerHeight-50);

btn.style.left=x+"px";
btn.style.top=y+"px";

alert("Please select Yes ❤️");

}

/* floating hearts generator */

setInterval(()=>{
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},400);

</script>

</body>
</html>

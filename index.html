<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date with Farwaa ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family: 'Georgia', serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    font-size:40px;
    color:#fff;
}

.buttons{
    margin-top:30px;
    position:relative;
}

button{
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
    transition:0.2s;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#no{
    background:#444;
    color:white;
    position:absolute;
}

#message{
    display:none;
    font-size:30px;
    color:white;
    margin-top:30px;
}

.heart{
    position:absolute;
    font-size:25px;
    animation:float 4s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Farwaa, will you go on a date with me? 🌹</h1>

    <div class="buttons">
        <button id="yes">Yes ❤️</button>
        <button id="no">No</button>
    </div>

    <div id="message">
        Yayyy Farwaa! 🎉  
        Can't wait for our date! ❤️
    </div>
</div>

<script>

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", function(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

document.getElementById("yes").onclick = function(){
    document.getElementById("message").style.display = "block";

    for(let i=0;i<30;i++){
        let heart = document.createElement("div");
        heart.className="heart";
        heart.innerHTML="❤️";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.animationDuration = (Math.random()*2+3)+"s";
        document.body.appendChild(heart);
    }
}

</script>

</body>
</html>
